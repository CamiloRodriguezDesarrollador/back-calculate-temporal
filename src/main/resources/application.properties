spring.datasource.url=${BD_UR}
spring.datasource.username=${BD_USERNAME}
spring.datasource.password=${BD_PASSWORD}

spring.datasource.first.url=${BD_UR}
spring.datasource.first.username=${BD_USERNAME}
spring.datasource.first.password=${BD_PASSWORD}
spring.datasource.first.driverClassName=oracle.jdbc.OracleDriver

spring.datasource.second.url=${BD_UR_2}
spring.datasource.second.username=${BD_USERNAME_2}
spring.datasource.second.password=${BD_PASSWORD_2}

spring.datasource.second.driverClassName=org.postgresql.Driver

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=none

server.port=8080


mail.api.url = https://back-mail-${ID_ENVIRONMENT}-ue.a.run.app/api/mail
connect.external.api.url = https://back-connect-internet-${ID_ENVIRONMENT}-ue.a.run.app/api/access-internet

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.hikari.validation-timeout=5000